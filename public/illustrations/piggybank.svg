<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="pg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB5A7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD6A5" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="200" cy="130" rx="75" ry="55" fill="url(#pg1)" stroke="#FFB5A7" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="275" cy="115" rx="25" ry="20" fill="url(#pg1)" stroke="#FFB5A7" stroke-width="2"/>
  <!-- Snout -->
  <ellipse cx="296" cy="118" rx="10" ry="8" fill="#FFD6A5" stroke="#FFB5A7" stroke-width="1.5"/>
  <circle cx="293" cy="116" r="2" fill="#E57373"/>
  <circle cx="299" cy="116" r="2" fill="#E57373"/>
  <!-- Eye -->
  <circle cx="270" cy="108" r="3" fill="#2D2B3D"/>
  <circle cx="271" cy="107" r="1" fill="white"/>
  <!-- Ears -->
  <ellipse cx="260" cy="95" rx="10" ry="12" fill="#FFB5A7" stroke="#E57373" stroke-width="1" opacity="0.7"/>
  <ellipse cx="280" cy="93" rx="10" ry="12" fill="#FFB5A7" stroke="#E57373" stroke-width="1" opacity="0.7"/>
  <!-- Legs -->
  <rect x="155" y="175" width="16" height="20" rx="6" fill="#FFB5A7"/>
  <rect x="185" y="175" width="16" height="20" rx="6" fill="#FFB5A7"/>
  <rect x="215" y="175" width="16" height="20" rx="6" fill="#FFB5A7"/>
  <rect x="245" y="175" width="16" height="20" rx="6" fill="#FFB5A7"/>
  <!-- Coin slot -->
  <rect x="188" y="78" width="24" height="4" rx="2" fill="#8B85C1" opacity="0.6"/>
  <!-- Floating coins -->
  <g opacity="0.7">
    <circle cx="160" cy="55" r="12" fill="#FFD6A5" stroke="#E8C97A" stroke-width="1.5"/>
    <text x="160" y="59" font-size="10" fill="#8B6914" text-anchor="middle" font-family="sans-serif">$</text>
  </g>
  <g opacity="0.5">
    <circle cx="230" cy="40" r="10" fill="#FFD6A5" stroke="#E8C97A" stroke-width="1.5"/>
    <text x="230" y="44" font-size="9" fill="#8B6914" text-anchor="middle" font-family="sans-serif">$</text>
  </g>
  <g opacity="0.4">
    <circle cx="185" cy="30" r="8" fill="#FFD6A5" stroke="#E8C97A" stroke-width="1"/>
    <text x="185" y="34" font-size="7" fill="#8B6914" text-anchor="middle" font-family="sans-serif">$</text>
  </g>
</svg>
